# world-seed.yml — declarative pre-NER world registry
#
# CANONICAL LOCATION (per task 5311 spec):
#   Wiki/Concepts/world-seed.yml  (inside Obsidian Vault, Syncthing synced)
#
# TEMPORARY LOCATION:
#   ~/.claude-bots/shared/lib/world-seed.yml
#   ron-builder cannot write to vault (workspace-protect.sh blocks non-assistants).
#   An assistant (Anya / Panda / etc.) should `mv` this file to the vault path above.
#   world_seed_loader.py searches both locations.
#
# Purpose:
#   - Solve jieba 未登錄詞 issue (e.g. 林榮川 → 林/榮川)
#   - Solve 同名衝突 (菜姐 person vs 川菜姐妹店 brand)
#   - Replace /tmp/mempalace/mempalace/onboarding.py interactive CLI
#     (headless VPS unfriendly, no version control, no [[wikilink]])
#
# Loader: ~/.claude-bots/shared/lib/world_seed_loader.py
#   - jieba.add_word(word, freq, tag) for every canonical name + alias
#   - UPSERT into channellab-kb memory.db entity_registry table
#   - Idempotent: safe to re-run after editing this file
#
# Schema:
#   people / projects / brands / aliases
#   each entry: id, name, aliases (list), tag (jieba POS), freq (jieba freq),
#               card (optional [[wikilink]]), note (optional)
#
# POS tags:
#   nr = person name, nz = other proper noun, nt = org, ns = place

