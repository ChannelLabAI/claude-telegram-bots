# Bot cron specs — session-scope CronCreate jobs that must be recreated every
# time a bot's Claude Code session restarts. Injected into the boot relay
# message by start.sh → bot-crons-prompt.sh.
#
# Source of truth = each bot's CLAUDE.md. Do not invent new jobs here; mirror
# the spec exactly so behaviour matches what each bot's persona expects.
#
# Schema:
#   <bot_dir_name>:
#     - cron: "<5-field cron expression>"   # server local time (TZ where bot runs)
#       prompt: "<prompt executed by the scheduled agent>"
#       recurring: true

anya:
  - cron: "57 8 * * 1-5"
    prompt: "用 background agent（sonnet）執行今日 Daily Note 建立：取今天日期（CST），若 ~/Documents/Obsidian Vault - OldRabbit/00Daily/{today}.md 不存在則建立並填入 frontmatter。拉 Google Calendar 今日 events，從前一天 Daily Note 找未完成項目，補寫今日代辦區塊。TG 私訊老兔（chat_id: 1050312492）：今日代辦摘要。"
    recurring: true
  - cron: "3 18 * * 1-5"
    prompt: "用 background agent（sonnet）執行今日 Daily Note 下半段補寫：整理今天對話記錄，歸納主要貢獻和時間線，補寫 Compiled Truth + Timeline + 今日 Pearl。將 Compiled Truth prepend 進 WorkJournal.md。掃 FATQ tasks 整理今日完成/未完成事項。TG 私訊老兔（chat_id: 1050312492）：今日收工日誌摘要。如果今天老兔主動回報的完成事項不到 2 件，額外問有沒有要記錄的。"
    recurring: true

