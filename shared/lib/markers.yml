# markers.yml — 4-type memory extractor keyword set (中文 + 英文)
#
# Used by ~/.claude-bots/shared/lib/memory_extractor.py.
# Consumed as plain literal substrings (case-insensitive). Regex escaped by loader.
#
# Rule (老兔 2026-04-08 拍板):
#   - 4 types only: DECISION / PREFERENCE / MILESTONE / PROBLEM
#   - NO emotional type (商業場景情緒是噪音不是訊號, 越界存團隊情緒破壞信任)
#   - disambiguate: PROBLEM + resolution marker → MILESTONE (keyword-only, no sentiment)
#
# Target: ≥60 Chinese markers total across all four types.

version: 1

